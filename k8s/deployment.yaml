apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: sehaj07/yourapp:89db7147ca2a5a144c0cd5b237edf73ec44d2b3a
        ports:
        - containerPort: 3000